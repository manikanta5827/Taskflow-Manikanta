version: '3.8'

services:
  db:
    name: taskflow-db
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d taskflow']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    name: taskflow-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - '8080:8080'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/taskflow?connection_limit=25
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'apk',
          'add',
          '--no-cache',
          'curl',
          '&&',
          'curl',
          '-f',
          'http://localhost:8080/health',
          '||',
          'exit',
          '1',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - api_logs:/app/logs

volumes:
  postgres_data:
  api_logs:
